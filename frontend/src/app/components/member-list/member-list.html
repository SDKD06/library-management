<div class="page-header">
  <h1>Members</h1>
  <div class="header-actions">
    <input class="search-input" placeholder="Search members..." [(ngModel)]="searchTerm">
    <button class="btn btn-primary" (click)="openAdd()">+ Add Member</button>
  </div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let member of filteredMembers; let i = index">
        <td><span class="badge">{{ i + 1 }}</span></td>
        <td><strong>{{ member.name }}</strong></td>
        <td class="muted">{{ member.email }}</td>
        <td class="muted">{{ member.phone }}</td>
        <td>
          <span class="status-badge" [class.active]="member.status === 'ACTIVE'" [class.inactive]="member.status === 'INACTIVE'">
            {{ member.status }}
          </span>
        </td>
        <td>
          <button class="btn btn-ghost" (click)="openEdit(member)">Edit</button>
          <button class="btn btn-danger" (click)="delete(member.id!)">Delete</button>
        </td>
      </tr>
      <tr *ngIf="filteredMembers.length === 0">
        <td colspan="6" class="empty">No members found.</td>
      </tr>
    </tbody>
  </table>
</div>

<div class="modal-overlay" *ngIf="showModal">
  <div class="modal">
    <h2>{{ isEditing ? 'Edit Member' : 'Add New Member' }}</h2>
    <div class="form-group">
      <label>Name</label>
      <input [(ngModel)]="currentMember.name" placeholder="Enter full name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="currentMember.email" placeholder="Enter email address">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input [(ngModel)]="currentMember.phone" placeholder="Enter phone number">
    </div>
    <div class="form-group">
      <label>Status</label>
      <select [(ngModel)]="currentMember.status">
        <option value="ACTIVE">Active</option>
        <option value="INACTIVE">Inactive</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" (click)="closeModal()">Cancel</button>
      <button class="btn btn-primary" (click)="save()">{{ isEditing ? 'Update' : 'Add Member' }}</button>
    </div>
  </div>
</div>
